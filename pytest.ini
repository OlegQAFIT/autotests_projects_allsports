[pytest]
testpaths =
    test_new_web_site
    test_new_web_site_sb
    api_tests/tests
    tests_journal
    test_journal_main_flow
    tests_web_site_old
    test_supplier_panel
    test_links

filterwarnings =
    ignore::DeprecationWarning

markers =
    pre_release: extended pre-release verification suite
    schedule: scheduled smoke and health checks
    smoke: lightweight post-release verification suite
    live_api: tests that perform real API POST checks and may write data
    form_submission: tests that click real UI form submit and can generate outbound contact requests
    release_gate: release blocker suite (fast critical checks before merge/release)
    cyrillic_gate: fast checks for cyrillic text leakage on EN pages
    console_strict: strict browser-console quality gate with minimal filtering
    docs_integrity: deep checks for legal documents language/content/canonical/version links
    visual_regression: visual baseline hash checks for key pages

addopts = -s -v --alluredir=allure-results
